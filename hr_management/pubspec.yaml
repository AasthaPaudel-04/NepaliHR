name: hr_management
description: "HR Management App - Nepal"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:       #for Nepali locale support
    sdk: flutter
  provider: ^6.1.1             #for LanguageProvider
  http: ^1.1.0
  flutter_secure_storage: ^9.0.0
  intl: ^0.20.0
  get: ^4.6.6
  device_info_plus: ^9.1.0
  flutter_spinkit: ^5.2.0
  file_picker: ^8.0.0
  open_file: ^3.3.2
  path_provider: ^2.1.3 
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true